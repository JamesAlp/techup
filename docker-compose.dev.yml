services:
  client:
    env_file:
      - .env.development
    build:
      context: ./client
      dockerfile: ./Dockerfile.dev
    volumes:
      - ./client:/usr/app/client
      - /usr/app/client/node_modules
      - /usr/app/client/.next

  nginx:
    env_file:
     - .env.development
    image: nginx:1.25.0
    environment:
      - LOCAL_IP=${LOCAL_IP}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "8080:80"