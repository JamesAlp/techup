name: Pull Request CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  client-outdated-report:
    name: Client Outdated Report
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install client dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate outdated dependency report
        shell: bash
        run: |
          set +e
          pnpm outdated --format json > outdated-report.json
          status=$?
          set -e

          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Upload outdated dependency report
        uses: actions/upload-artifact@v4
        with:
          name: client-outdated-report
          path: client/outdated-report.json

  client-audit:
    name: Client Audit
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'master'

    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install client dependencies
        run: pnpm install --frozen-lockfile

      - name: Run client dependency audit
        run: pnpm audit --audit-level high

  client-unit-tests:
    name: Client Unit Tests
    runs-on: ubuntu-latest
    needs:
      - client-audit
    if: github.event.pull_request.draft == false && always() && (needs.client-audit.result == 'success' || needs.client-audit.result == 'skipped')

    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install client dependencies
        run: pnpm install --frozen-lockfile

      - name: Run client unit tests
        run: pnpm exec jest --runInBand
